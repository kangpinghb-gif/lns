<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LNS · 人生导航系统</title>
<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  background: #FAFAFA;
  color: #0A0A0A;
  font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  line-height: 1.6;
  min-height: 100vh;
}

/* ===== TYPOGRAPHY ===== */
h1, h2, h3, h4, h5, h6 {
  font-weight: 400;
  letter-spacing: -0.02em;
  line-height: 1.1;
}

/* ===== LAYOUT ===== */
.container {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 64px;
}

/* ===== NAVBAR (Cosmos minimal) ===== */
nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 36px 64px;
  max-width: 1280px;
  margin: 0 auto;
}

.nav-brand {
  font-size: 0.8rem;
  font-weight: 400;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #0A0A0A;
}

.nav-brand span {
  color: #D4A373;
}

.nav-links {
  display: flex;
  gap: 32px;
  list-style: none;
}

.nav-links a {
  text-decoration: none;
  color: #0A0A0A;
  font-size: 0.75rem;
  font-weight: 400;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  transition: opacity 0.2s;
}

.nav-links a:hover {
  opacity: 0.5;
}

/* ===== HERO SECTION (Aesop oversized title) ===== */
.hero {
  padding: 120px 0 80px;
  border-bottom: 1px solid #EFEFEF;
}

.hero-title {
  font-size: 5rem;
  font-weight: 350;
  letter-spacing: -0.04em;
  line-height: 1.05;
  max-width: 820px;
  margin-bottom: 28px;
  color: #0A0A0A;
}

.hero-title .highlight {
  color: #D4A373;
}

.hero-subtitle {
  font-size: 1rem;
  font-weight: 300;
  color: rgba(10, 10, 10, 0.5);
  max-width: 520px;
  line-height: 1.6;
  margin-bottom: 48px;
  letter-spacing: 0.01em;
}

.hero-ctas {
  display: flex;
  gap: 16px;
}

.btn {
  display: inline-block;
  padding: 14px 32px;
  font-size: 0.75rem;
  font-weight: 400;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  text-decoration: none;
  border: 1px solid #0A0A0A;
  border-radius: 2px;
  transition: all 0.25s ease;
  cursor: pointer;
  background: transparent;
  color: #0A0A0A;
}

.btn-primary {
  background: #0A0A0A;
  color: #FAFAFA;
  border-color: #0A0A0A;
}

.btn-primary:hover {
  background: #D4A373;
  border-color: #D4A373;
  color: #FAFAFA;
}

.btn-outline:hover {
  background: #0A0A0A;
  color: #FAFAFA;
}

/* ===== STEPS SECTION (horizontal list, Aesop product-list style) ===== */
.steps-section {
  padding: 80px 0 64px;
}

.section-label {
  font-size: 0.65rem;
  font-weight: 400;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: rgba(10, 10, 10, 0.3);
  margin-bottom: 48px;
}

.steps-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 24px;
}

.step-item {
  border-top: 1px solid #EFEFEF;
  padding-top: 20px;
}

.step-number {
  font-size: 0.65rem;
  letter-spacing: 0.1em;
  color: rgba(10, 10, 10, 0.25);
  margin-bottom: 8px;
  font-weight: 400;
}

.step-title {
  font-size: 1rem;
  font-weight: 400;
  color: #0A0A0A;
  margin-bottom: 6px;
  letter-spacing: -0.01em;
}

.step-desc {
  font-size: 0.75rem;
  font-weight: 300;
  color: rgba(10, 10, 10, 0.45);
  line-height: 1.5;
}

/* ===== TREND CHART SECTION ===== */
.chart-section {
  padding: 64px 0 100px;
}

.chart-section .section-label {
  margin-bottom: 36px;
}

.chart-container {
  width: 100%;
  overflow: visible;
}

.chart-svg {
  width: 100%;
  height: auto;
  display: block;
}

/* ===== CHART ANNOTATION (Aesop minimal labels) ===== */
.chart-annotations {
  display: flex;
  justify-content: space-between;
  margin-top: 12px;
  padding: 0 0;
}

.chart-label {
  font-size: 0.6rem;
  font-weight: 300;
  color: rgba(10, 10, 10, 0.3);
  letter-spacing: 0.02em;
  flex: 1;
  text-align: center;
}

.chart-label:first-child {
  text-align: left;
}

.chart-label:last-child {
  text-align: right;
}

/* ===== CHART LEGEND ===== */
.chart-legend {
  display: flex;
  justify-content: center;
  gap: 32px;
  margin-top: 20px;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.65rem;
  font-weight: 300;
  color: rgba(10, 10, 10, 0.5);
  letter-spacing: 0.04em;
}

.legend-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  display: inline-block;
}

/* ===== FOOTER (Cosmos minimal) ===== */
footer {
  padding: 40px 64px;
  max-width: 1280px;
  margin: 0 auto;
  border-top: 1px solid #EFEFEF;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.footer-text {
  font-size: 0.65rem;
  font-weight: 300;
  color: rgba(10, 10, 10, 0.3);
  letter-spacing: 0.04em;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 900px) {
  .container { padding: 0 32px; }
  nav { padding: 28px 32px; flex-direction: column; gap: 20px; }
  .hero { padding: 80px 0 48px; }
  .hero-title { font-size: 3rem; }
  .steps-grid { grid-template-columns: repeat(2, 1fr); gap: 20px; }
  .chart-annotations { display: none; }
  footer { padding: 32px 32px; flex-direction: column; gap: 8px; text-align: center; }
}

@media (max-width: 600px) {
  .container { padding: 0 24px; }
  nav { padding: 20px 24px; }
  .nav-links { display: none; }
  .hero-title { font-size: 2.2rem; }
  .hero-subtitle { font-size: 0.9rem; }
  .hero-ctas { flex-direction: column; }
  .btn { text-align: center; }
  .steps-grid { grid-template-columns: 1fr; }
  .chart-section { padding: 48px 0 72px; }
}

/* ===== DECORATIVE LINE (Cosmos subtle) ===== */
.fine-line {
  height: 1px;
  background: #EFEFEF;
  width: 100%;
}

/* ===== UTILITY ===== */
.text-accent {
  color: #D4A373;
}

</style>
</head>
<body>

<!-- ===== NAVBAR ===== -->
<nav>
  <div class="nav-brand"><span>LNS</span> · 人生导航系统</div>
  <ul class="nav-links">
    <li><a href="#">首页</a></li>
    <li><a href="#">趋势</a></li>
    <li><a href="#">命理</a></li>

  </ul>
</nav>

<!-- ===== HERO ===== -->
<section class="hero container">

    看清当下<br>

  <div class="hero-ctas">
    <a href="#" class="btn btn-primary">开始生成报告</a>
    <a href="#" class="btn btn-outline">查看趋势总览</a>

</section>

<!-- ===== STEPS (horizontal list) ===== -->
<section class="steps-section container">

  <div class="steps-grid">
    <div class="step-item">
      <div class="step-number">01</div>
      <div class="step-title">输入信息</div>
      <div class="step-desc">出生时间与地点</div>

      <div class="step-number">02</div>
      <div class="step-title">总览K线</div>
      <div class="step-desc">人生大趋势波动</div>
    </div>
    <div class="step-item">
      <div class="step-number">03</div>
      <div class="step-title">命理透视</div>
      <div class="step-desc">深层结构解析</div>
    </div>
    <div class="step-item">
      <div class="step-number">04</div>
      <div class="step-title">流年详情</div>
      <div class="step-desc">逐年运程细读</div>
    </div>
  </div>
</section>

<div class="fine-line container"></div>

<!-- ===== TREND CHART ===== -->
<section class="chart-section container">
  <div class="section-label">人生趋势能量</div>

  <div class="chart-container">
    <svg class="chart-svg" viewBox="0 0 1200 340" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">

      <!-- Grid lines (Cosmos ultra-subtle) -->
      <line x1="60" y1="50" x2="1140" y2="50" stroke="#EFEFEF" stroke-width="0.5" />
      <line x1="60" y1="130" x2="1140" y2="130" stroke="#EFEFEF" stroke-width="0.5" />
      <line x1="60" y1="210" x2="1140" y2="210" stroke="#EFEFEF" stroke-width="0.5" />
      <line x1="60" y1="290" x2="1140" y2="290" stroke="#EFEFEF" stroke-width="0.5" />

      <!-- Y-axis labels -->
      <text x="52" y="54" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#D4D4D4" text-anchor="end">100%</text>
      <text x="52" y="134" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#D4D4D4" text-anchor="end">75%</text>
      <text x="52" y="214" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#D4D4D4" text-anchor="end">50%</text>
      <text x="52" y="294" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#D4D4D4" text-anchor="end">25%</text>

      <!-- Data points: 10→18%, 15→32%, 20→48%, 25→56%, 30→70%, 35→83%, 40→46%, 45→60%, 50→74%, 55→40%, 60→54%, 65→62% -->
      <!-- Chart area: x from 100 to 1100, y from 30 (0%) to 310 (100%) → pixel = 310 - (val/100 * 280) -->
      <!-- Age labels at x ~ every 83px starting at 100 -->

      <!-- Filled area under the curve (Cosmos subtle tint) -->
      <defs>
        <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#D4A373" stop-opacity="0.12"/>
          <stop offset="100%" stop-color="#D4A373" stop-opacity="0"/>
        </linearGradient>
      </defs>

      <!-- Area fill -->
      <polygon
        points="100,259.6 183.6,220.4 267.3,145.6 350.9,134.6 434.5,102 518.2,78.6 601.8,182.6 685.5,142 769.1,93.8 852.7,198 936.4,159.6 1020,172.4 1020,310 100,310"
        fill="url(#areaGrad)"
      />

      <!-- Main curve (ultra-thin, amber) -->
      <polyline
        points="100,259.6 183.6,220.4 267.3,145.6 350.9,134.6 434.5,102 518.2,78.6 601.8,182.6 685.5,142 769.1,93.8 852.7,198 936.4,159.6 1020,172.4"
        fill="none"
        stroke="#D4A373"
        stroke-width="1.2"
        stroke-linecap="round"
        stroke-linejoin="round"
      />

      <!-- ECG-style fine line overlay (barely visible, adds texture) -->
      <polyline
        points="100,259.6 183.6,220.4 267.3,145.6 350.9,134.6 434.5,102 518.2,78.6 601.8,182.6 685.5,142 769.1,93.8 852.7,198 936.4,159.6 1020,172.4"
        fill="none"
        stroke="#0A0A0A"
        stroke-width="0.5"
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-dasharray="2 6"
        opacity="0.3"
      />

      <!-- Data dots -->
      <circle cx="100" cy="259.6" r="2.5" fill="#D4A373" opacity="0.8" />
      <circle cx="183.6" cy="220.4" r="2.5" fill="#D4A373" opacity="0.8" />
      <circle cx="267.3" cy="145.6" r="2.5" fill="#D4A373" opacity="0.8" />
      <circle cx="350.9" cy="134.6" r="2.5" fill="#D4A373" opacity="0.8" />
      <circle cx="434.5" cy="102" r="2.5" fill="#D4A373" opacity="0.8" />
      <circle cx="518.2" cy="78.6" r="2.5" fill="#D4A373" opacity="0.8" />
      <circle cx="601.8" cy="182.6" r="2.5" fill="#D4A373" opacity="0.8" />
      <circle cx="685.5" cy="142" r="2.5" fill="#D4A373" opacity="0.8" />
      <circle cx="769.1" cy="93.8" r="2.5" fill="#D4A373" opacity="0.8" />
      <circle cx="852.7" cy="198" r="2.5" fill="#D4A373" opacity="0.8" />
      <circle cx="936.4" cy="159.6" r="2.5" fill="#D4A373" opacity="0.8" />
      <circle cx="1020" cy="172.4" r="2.5" fill="#D4A373" opacity="0.8" />

      <!-- X-axis labels -->
      <text x="100" y="328" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#B0B0B0" text-anchor="middle">10</text>
      <text x="183.6" y="328" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#B0B0B0" text-anchor="middle">15</text>
      <text x="267.3" y="328" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#B0B0B0" text-anchor="middle">20</text>
      <text x="350.9" y="328" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#B0B0B0" text-anchor="middle">25</text>
      <text x="434.5" y="328" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#B0B0B0" text-anchor="middle">30</text>
      <text x="518.2" y="328" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#B0B0B0" text-anchor="middle">35</text>
      <text x="601.8" y="328" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#B0B0B0" text-anchor="middle">40</text>
      <text x="685.5" y="328" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#B0B0B0" text-anchor="middle">45</text>
      <text x="769.1" y="328" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#B0B0B0" text-anchor="middle">50</text>
      <text x="852.7" y="328" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#B0B0B0" text-anchor="middle">55</text>
      <text x="936.4" y="328" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#B0B0B0" text-anchor="middle">60</text>
      <text x="1020" y="328" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#B0B0B0" text-anchor="middle">65</text>

    </svg>
  </div>

  <div class="chart-legend">
    <span class="legend-item">
      <span class="legend-dot" style="background:#D4A373;"></span>
      趋势能量
    </span>
    <span class="legend-item">
      <span class="legend-dot" style="background:#0A0A0A;opacity:0.3;"></span>
      基准参照
    </span>
  </div>
</section>

<footer>
  <span class="footer-text">© LNS · 人生导航系统</span>

</footer>

</body>
</html>
